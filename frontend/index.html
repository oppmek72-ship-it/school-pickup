<!doctype html>
<html lang="lo">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1565C0" />
    <meta name="description" content="ລະບົບຮັບນັກຮຽນອັດສະລິຍະ - Smart School Pick-up System" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="School Pickup" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://school-pickup-backend.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://school-pickup-backend.onrender.com" />
    <title>Smart School Pick-up</title>
  </head>
  <body>
    <div id="root">
      <div id="splash" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0F172A 0%,#1E3A5F 100%);font-family:'Noto Sans Lao',sans-serif;">
        <img src="/favicon.ico" style="width:80px;height:80px;border-radius:20px;margin-bottom:24px;box-shadow:0 8px 32px rgba(59,130,246,0.3);object-fit:contain;" />
        <p style="color:white;font-size:1.4rem;font-weight:700;margin:0 0 8px;">ໂຮງຮຽນ ເພັດດາຣາ</p>
        <p style="color:#93C5FD;font-size:0.9rem;margin:0 0 32px;">ລະບົບເອີ້ນນັກຮຽນກັບບ້ານ</p>
        <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.15);border-top-color:#3B82F6;border-radius:50%;animation:sp .8s linear infinite;"></div>
        <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
