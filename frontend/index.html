<!doctype html>
<html lang="lo">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1565C0" />
    <meta name="description" content="ລະບົບຮັບນັກຮຽນອັດສະລິຍະ - Smart School Pick-up System" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="School Pickup" />
    <link rel="manifest" href="/manifest.json" />
    <title>Smart School Pick-up</title>
  </head>
  <body>
    <div id="root">
      <div id="splash" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0F172A 0%,#1E3A5F 100%);font-family:'Noto Sans Lao',sans-serif;">
        <div style="width:80px;height:80px;background:linear-gradient(135deg,#3B82F6,#2563EB);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 8px 32px rgba(59,130,246,0.3);">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 1.1 2.7 3 6 3s6-1.9 6-3v-5"/></svg>
        </div>
        <p style="color:white;font-size:1.4rem;font-weight:700;margin:0 0 8px;">ໂຮງຮຽນ ເພັດດາຣາ</p>
        <p style="color:#93C5FD;font-size:0.9rem;margin:0 0 32px;">ລະບົບເອີ້ນນັກຮຽນກັບບ້ານ</p>
        <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.15);border-top-color:#3B82F6;border-radius:50%;animation:sp .8s linear infinite;"></div>
        <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
