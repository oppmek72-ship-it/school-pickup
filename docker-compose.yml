version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: school_pickup
      POSTGRES_USER: pickup_user
      POSTGRES_PASSWORD: pickup_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://pickup_user:pickup_pass@db:5432/school_pickup
      - JWT_SECRET=supersecretkey_school_pickup_2024
      - PORT=3001
      - FRONTEND_URL=http://localhost:5173

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
