databases:
  - name: school-pickup-db
    plan: free
    databaseName: school_pickup
    user: pickup_user

services:
  - type: web
    name: school-pickup-app
    plan: free
    runtime: node
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: school-pickup-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
