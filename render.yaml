databases:
  - name: school-pickup-db-sg
    plan: free
    databaseName: school_pickup
    user: pickup_user
    region: singapore

services:
  - type: web
    name: school-pickup-sg
    plan: starter
    runtime: node
    region: singapore
    healthCheckPath: /api/health
    buildCommand: cd frontend && npm install --legacy-peer-deps --include=dev && npx vite build && cd ../backend && npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: school-pickup-db-sg
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
